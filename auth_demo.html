<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Demo - Kyrgyzstan Agri App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-[3rem] p-10 shadow-2xl shadow-slate-200 w-full max-w-md border border-slate-100">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black uppercase tracking-tighter mb-2">Авторизация</h1>
            <p id="status" class="text-sm text-slate-500 font-medium tracking-tight">Введите данные для входа</p>
        </div>

        <!-- Auth Forms -->
        <div id="auth-forms" class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-4">Email</label>
                <input type="email" id="email" placeholder="vasya@fermer.kg" class="w-full bg-slate-50 border-none rounded-3xl px-6 py-4 text-sm font-bold focus:ring-4 focus:ring-emerald-500/10 transition-all outline-none">
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-4">Пароль</label>
                <input type="password" id="password" placeholder="••••••••" class="w-full bg-slate-50 border-none rounded-3xl px-6 py-4 text-sm font-bold focus:ring-4 focus:ring-emerald-500/10 transition-all outline-none">
            </div>

            <div class="grid grid-cols-2 gap-4 pt-4">
                <button id="btn-login" class="bg-emerald-600 text-white py-4 rounded-3xl font-black text-xs uppercase tracking-widest hover:brightness-110 active:scale-95 transition-all shadow-lg shadow-emerald-600/20">Войти</button>
                <button id="btn-register" class="bg-slate-900 text-white py-4 rounded-3xl font-black text-xs uppercase tracking-widest hover:bg-slate-800 active:scale-95 transition-all">Создать</button>
            </div>
        </div>

        <!-- Logged In State -->
        <div id="user-info" class="hidden space-y-6 text-center">
            <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-[2rem] flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
            <div>
                <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-1">Вы вошли как</p>
                <p id="user-email" class="font-black text-slate-900"></p>
            </div>
            <button id="btn-logout" class="w-full bg-red-50 text-red-600 py-4 rounded-3xl font-black text-xs uppercase tracking-widest hover:bg-red-100 transition-all active:scale-95 mt-4">Выйти из аккаунта</button>
        </div>

        <p id="error-msg" class="text-center text-red-500 text-[10px] font-black uppercase tracking-widest mt-6 hidden"></p>
    </div>

    <!-- 
        Примечание: В реальном проекте (Vite/Webpack) вы бы импортировали функции из auth_module.js.
        Здесь приведен пример того, как это подключается.
    -->
    <script type="module">
        import { register, login, logout, getCurrentUser } from './src/services/auth_module.js';

        const el = {
            email: document.getElementById('email'),
            pass: document.getElementById('password'),
            btnLogin: document.getElementById('btn-login'),
            btnReg: document.getElementById('btn-register'),
            btnLogout: document.getElementById('btn-logout'),
            status: document.getElementById('status'),
            userEmail: document.getElementById('user-email'),
            forms: document.getElementById('auth-forms'),
            userInfo: document.getElementById('user-info'),
            error: document.getElementById('error-msg')
        };

        function showError(msg) {
            el.error.textContent = msg;
            el.error.classList.remove('hidden');
        }

        function updateUI(user) {
            if (user) {
                el.forms.classList.add('hidden');
                el.userInfo.classList.remove('hidden');
                el.userEmail.textContent = user.email;
                el.status.textContent = 'Добро пожаловать!';
                el.error.classList.add('hidden');
            } else {
                el.forms.classList.remove('hidden');
                el.userInfo.classList.add('hidden');
                el.status.textContent = 'Введите данные для входа';
            }
        }

        // Init
        getCurrentUser().then(user => updateUI(user));

        el.btnLogin.onclick = async () => {
            try {
                const user = await login(el.email.value, el.pass.value);
                updateUI(user);
            } catch (e) { showError(e.message); }
        };

        el.btnReg.onclick = async () => {
            try {
                const user = await register(el.email.value, el.pass.value);
                updateUI(user);
            } catch (e) { showError(e.message); }
        };

        el.btnLogout.onclick = async () => {
            await logout();
            updateUI(null);
            el.email.value = '';
            el.pass.value = '';
        };
    </script>
</body>
</html>
